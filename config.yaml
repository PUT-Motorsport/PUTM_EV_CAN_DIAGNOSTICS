# Ustawienia magistrali
bus:
  interface: "virtual"
  channel: "virtual0"
  bitrate: 1000000

# Parametry testowanego układu (Device Under Test - DUT)
dut:
  rx_id: 0x100      # ID, na które STM32 oczekuje wiadomości
  tx_id: 0x101      # ID, na którym STM32 odsyła odpowiedzi
  timeout_ms: 50    # Maksymalny czas oczekiwania na reakcję biblioteki

# Foldery wyjściowe
paths:
  logs: "logs"
  reports: "reports"